<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OceanQC Sample Report</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: Pretendard, "Noto Sans KR", Inter, system-ui, -apple-system, sans-serif;
      background: #0f141c;
      color: #e6edf5;
      line-height: 1.6;
    }
    .card {
      max-width: 780px;
      margin: 0 auto;
      border: 1px solid rgba(160, 180, 210, 0.24);
      border-radius: 14px;
      background: #171d27;
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
      font-weight: 500;
    }
    a {
      color: #8dc2ff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #cdd9eb;
      background: rgba(180, 200, 230, 0.08);
      border-radius: 6px;
      padding: 1px 6px;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>OceanQC 샘플 리포트 자리 표시자</h1>
    <p>
      이 파일은 GitHub 링크 연결을 위한 샘플 리포트 경로입니다.
      실제 리포트는 로컬에서 아래 명령으로 생성한 뒤 내용으로 교체해 사용할 수 있습니다.
    </p>
    <p><code>python main.py -i data/sample.csv -o reports/ --fill none</code></p>
    <p>
      프로젝트 저장소:
      <a href="https://github.com/Justman-yzz/oceanqc" target="_blank" rel="noopener noreferrer">
        github.com/Justman-yzz/oceanqc
      </a>
    </p>
  </section>
</body>
</html>
